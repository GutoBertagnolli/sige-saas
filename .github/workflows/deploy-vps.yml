name: Deploy VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  validate:
    name: Validate build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Build backend
        working-directory: backend
        run: |
          npm ci
          npx prisma generate
          npm run build

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Configure SSH key
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/sige_vps_key
          chmod 600 ~/.ssh/sige_vps_key
          ssh-keyscan -p "${VPS_PORT:-22}" -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Deploy application
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          APP_DIR: /var/www/sige-saas
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/sige_vps_key -p "${VPS_PORT:-22}" "$VPS_USER@$VPS_HOST" "APP_DIR='$APP_DIR' bash -s" <<'REMOTE'
          set -euo pipefail

          cd "$APP_DIR"
          git remote add origin https://github.com/GutoBertagnolli/sige-saas.git 2>/dev/null || git remote set-url origin https://github.com/GutoBertagnolli/sige-saas.git

          if [ -n "$(git status --porcelain)" ]; then
            git stash push -u -m "github-actions-deploy-$(date +%Y%m%d%H%M%S)"
          fi

          git fetch origin main
          git checkout main
          git pull --ff-only origin main

          cd "$APP_DIR/backend"
          npm ci
          npx prisma migrate deploy
          npx prisma generate
          npm run build

          if pm2 describe sige-backend >/dev/null 2>&1; then
            pm2 restart sige-backend
          else
            pm2 start dist/main.js --name sige-backend
          fi
          pm2 save || true

          cd "$APP_DIR/frontend"
          npm ci
          npm run build

          if command -v systemctl >/dev/null 2>&1; then
            sudo systemctl reload nginx 2>/dev/null || systemctl reload nginx
          fi

          cd "$APP_DIR"
          echo "Deploy concluído."
          REMOTE
